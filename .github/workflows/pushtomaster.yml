name: Publish Pre-Release Docker 

on:
  push:
    # branches to consider in the event; optional, defaults to all
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: "Publish Pre-Release Docker"
    env:
        ASPNETCORE_ENVIRONMENT: "Production"
        PACKAGE_VERSION: "0.1.0-ci.${{ github.run_number }}"

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2.3.4
      with:
        fetch-depth: 0        

    - name: Restore Nuget Packages
      run: dotnet restore TestHosts/TestHosts.sln --source ${{ secrets.PUBLICFEEDURL }} --source ${{ secrets.PRIVATEFEED_URL }}

    - name: Build Code
      run: dotnet build TestHosts/TestHosts.sln --configuration Release

    - name: 'Get Previous tag'
      id: get-latest-tag
      uses: actions-ecosystem/action-get-latest-tag@v1
      with:
          semver_only: true

    - name: 'Bump Version'
      id: bump-semver
      uses: actions-ecosystem/action-bump-semver@v1
      with:
        current_version: ${{ steps.get-latest-tag.outputs.tag }}
        level: patch
    
    - name: Print Version
      id: next_version
      run: echo ::set-output name=VERSION::${{ steps.bump-semver.outputs.new_version }}-build$GITHUB_RUN_NUMBER

    - name: Build and Publish Nuget Packages
      run: |
        dotnet pack TestHosts/TestHosts.Clients/TestHosts.Clients.csproj --configuration Release --output Nugets /p:PackageVersion=${{ steps.next_version.outputs.VERSION }} /p:Version=${{ steps.next_version.outputs.VERSION }}
        dotnet nuget push Nugets/TestHosts.Clients.${{ steps.next_version.outputs.VERSION }}.nupkg --api-key ${{ secrets.PRIVATEFEED_APIKEY }} --source ${{ secrets.PRIVATEFEED_URL }}
    
    - name: Publish Images to Docker Hub
      run: |
        docker build ./TestHosts --file TestHosts/TestHosts/Dockerfile --tag stuartferguson/testhosts:master
        docker login --username=${{ secrets.DOCKER_USERNAME }} --password=${{ secrets.DOCKER_PASSWORD }}
        docker push stuartferguson/testhosts:master

  buildwidows:
    name: "Publish Pre-Release Docker for Windows"
    env:
        ASPNETCORE_ENVIRONMENT: "Production"

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v2.3.4 
      with:
        fetch-depth: 0

    - name: Publish Windows Images to Docker Hub
      run: |
        docker build ./TestHosts --file TestHosts/TestHosts/Dockerfilewindows --tag stuartferguson/testhostswindows:master
        docker login --username=${{ secrets.DOCKER_USERNAME }} --password=${{ secrets.DOCKER_PASSWORD }}
        docker push stuartferguson/testhostswindows:master
